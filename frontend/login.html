<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishclo — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="tela-login">
    <div class="tag-card login-card">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__name">wishclo</span>
      </div>

      <div class="login-tabs">
        <button class="login-tab login-tab--ativa" id="tab-entrar">Entrar</button>
        <button class="login-tab" id="tab-criar-conta">Criar conta</button>
      </div>

      <form id="form-login">
        <div class="field" id="campo-nome" hidden>
          <label for="login-nome">Nome</label>
          <input type="text" id="login-nome" class="input" />
        </div>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="input" required />
        </div>
        <div class="field">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" class="input" required minlength="6" />
        </div>

        <p class="form-erro" id="login-erro" hidden></p>
        <p class="login-info" id="login-info" hidden></p>

        <button type="submit" class="btn btn--primary" id="btn-submeter" style="width: 100%;">Entrar</button>
      </form>

      <div class="login-divisor"><span>ou</span></div>

      <button type="button" class="btn btn--google" id="btn-google" style="width: 100%;">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.4 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C39.9 36.6 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/>
        </svg>
        <span>Entrar com Google</span>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
